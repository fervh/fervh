<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="240" viewBox="0 0 1000 240" font-family="'DejaVu Sans Mono','SFMono-Regular',Consolas,monospace">
  <defs>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#7ee787" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
    <style>
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .hud { animation: hud 2.6s ease-in-out infinite; }
      @keyframes hud { 0%,100% { opacity: .85; } 50% { opacity: .28; } }
      .bar { animation: bar 3s ease-in-out infinite; transform-origin: 500px 206px; }
      @keyframes bar { 0%,100% { transform: scaleX(1); } 50% { transform: scaleX(.6); } }
    </style>
  </defs>
  <rect x="0" y="0" width="1000" height="240" rx="12" fill="#0d1117"/>
  <rect x="0" y="0" width="1000" height="240" rx="12" fill="url(#grid)"/>
  <path class="hud" d="M18 40 V18 H40" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <path class="hud" d="M982 40 V18 H960" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <path class="hud" d="M18 200 V222 H40" fill="none" stroke="#7ee787" stroke-width="2"/>
  <path class="hud" d="M982 200 V222 H960" fill="none" stroke="#7ee787" stroke-width="2"/>
  <text x="500" y="66" text-anchor="middle" font-size="15" fill="#8b949e"><tspan fill="#7ee787">fernando@velahidalgo</tspan>:<tspan fill="#58a6ff">~</tspan>$ whoami --identity</text>
  <text x="500" y="140" text-anchor="middle" font-size="52" font-weight="bold" letter-spacing="4" fill="url(#nameGrad)">FERNANDO VELA HIDALGO<tspan class="cursor" fill="#7ee787" dx="8">█</tspan></text>
  <text x="500" y="180" text-anchor="middle" font-size="17" letter-spacing="2" fill="#c9d1d9">Senior Software Engineer<tspan fill="#484f58"> // </tspan>R&amp;D Robotic Engineer<tspan fill="#484f58"> // </tspan>Hamburg, DE</text>
  <rect class="bar" x="250" y="205" width="500" height="2" fill="url(#barGrad)"/>
</svg>
